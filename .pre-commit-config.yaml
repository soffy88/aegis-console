repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']

  - repo: local
    hooks:
      - id: no-codename
        name: "guard: no internal codenames"
        language: script
        entry: scripts/check_no_codename.sh
        pass_filenames: false
